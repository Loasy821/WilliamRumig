<!DOCTYPE html>
<html>
<head>
    <title>Mini Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #game { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #message { margin-top: 20px; font-size: 24px; }
    </style>
</head>
<body>
    <div id="game">
        <button id="startGame">Start Game</button>
        <div id="message"></div>
    </div>
    <script>
        const startButton = document.getElementById('startGame');
        const messageDiv = document.getElementById('message');

        startButton.addEventListener('click', () => {
            const randomNumber = Math.floor(Math.random() * 10) + 1;
            const userGuess = prompt('Guess a number between 1 and 10:');
            if (parseInt(userGuess) === randomNumber) {
                messageDiv.textContent = 'Congratulations! You guessed it right!';
            } else {
                messageDiv.textContent = `Sorry! The correct number was ${randomNumber}.`;
            }
        });
    </script>
</body>
</html>
